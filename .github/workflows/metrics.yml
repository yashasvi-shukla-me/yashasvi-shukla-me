name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: yashasvi-shukla-me

          base: activity

          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14

          plugin_followup: yes
